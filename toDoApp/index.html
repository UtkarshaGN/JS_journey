<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do app</title>
</head>
<style>
/* General body styling */
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding-top: 50px;
}

/* Main container */
.todoapp {
    background-color: #fff;
    padding: 20px 30px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    width: 350px;
}

/* Title */
.todoapp h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

/* Form input and button */
form {
    display: flex;
    margin-bottom: 20px;
}

#taskInput {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px 0 0 4px;
    outline: none;
}

#taskInput:focus {
    border-color: #007BFF;
}

button {
    padding: 10px 15px;
    border: none;
    background-color: #007BFF;
    color: #fff;
    cursor: pointer;
    border-radius: 0 4px 4px 0;
    transition: background-color 0.3s ease;
}

button:hover {
    background-color: #0056b3;
}

/* Task list */
#taskList {
    list-style: none;
    padding: 0;
    margin: 0;
}

#taskList li {
    padding: 10px;
    background-color: #f9f9f9;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#taskList li:nth-child(odd) {
    background-color: #f1f1f1;
}

#taskList li button {
    background-color: red;
    border: none;
    color: #fff;
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
}

#taskList li button:hover {
    background-color: darkred;
}

</style>
<body>

    <div class="todoapp" >
        <h2>To Do App</h2>
    <form>
        <input type="text" name="userToDo" id="taskInput" placeholder="Enter a new task">
        <!--<input type="password" name="password" id="taskInput" placeholder="Enter a new task">-->
        <button type="submit">Add Task</button>

    </form>
    <ul id="taskList">

    </ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
