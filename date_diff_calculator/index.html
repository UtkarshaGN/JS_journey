<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: rgb(159, 159, 240);
        }

        .main {
            width: 400px;
            margin: 100px auto;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
        }

        .main label{
            display: block;
            margin: 10px;
        }
        .main input{
            width: 100%;
            height: 30px;
        }

        .main button{
            background-color: blue;
            width: 100%;
           color: white;
           border: none;
            padding: 10px;
            margin-top: 20px;
           
            
        }
    </style>
</head>

<body>

    <div class="main">
        <h3>Date difference Calculator</h3>

        <div>
            <label>From date</label>
            <input type="datetime-local" id="fromDate">
        </div>
        <div>
            <label> To date</label>
            <input type="datetime-local" id="toDate">
        </div>

<button>Save</button>
    </div>

    <script src="app.js">

        
    </script>
</body>

</html>
