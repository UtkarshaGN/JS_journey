<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Box </title>
</head>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .main {
            width: 1320px;
            border: 1px solid red;
            margin: auto;
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(4, 1fr);
        }

        .mainItem img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .lightBoxOverLay{
            width: 100%;
            height: 100%;
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
            background-color: rgba(0,0,0,0.5);
            transform: scale(0); 
        }
        .lightBoxMid{
            width: 800px;
            position: relative;
        }
        .lightBoxMid img{
            width: 100%;
        }
        .lightBoxMid span{
             position: absolute;
             right: 0px;
             font-size: 50px;
             background-color: red;
             cursor: pointer;
             color: white;
        }
        .lightBoxOverOpen{
            transform: scale(1);
        }
    </style>
<body>
    <div class="lightBoxOverLay ">
        <div class="lightBoxMid">
            <span>&times;</span>
            <img src="https://thumbs.dreamstime.com/b/spring-flowers-blue-crocuses-drops-water-backgro-background-tracks-rain-113784722.jpg" alt="">
        </div>
    </div>
